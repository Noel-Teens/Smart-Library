name: library_management_app
description: "Smart Library Management System — a gamified, role-based library platform."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State Management (PRD §5.1)
  flutter_riverpod: ^2.6.1

  # Declarative Routing (PRD §5.1)
  go_router: ^14.8.1

  # Value Equality for Entities
  equatable: ^2.0.7

  # Date formatting
  intl: ^0.19.0

  # ── Backend (Supabase) ──
  supabase_flutter: ^2.8.0

  # ── Auth ──
  google_sign_in: ^6.2.2

  # ── Firebase / FCM ──
  firebase_core: ^3.9.0
  firebase_messaging: ^15.2.0
  flutter_local_notifications: ^18.0.0

  # ── Environment Config ──
  flutter_dotenv: ^5.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter_icons:
  android: true
  ios: true
  image_path: "assets/icon/logo.png"

flutter:
  uses-material-design: true

  assets:
    - .env

  # ── Inter Font (Offline Bundled) ──
  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-VariableFont_opsz,wght.ttf
        - asset: assets/fonts/Inter-Italic-VariableFont_opsz,wght.ttf
          style: italic
